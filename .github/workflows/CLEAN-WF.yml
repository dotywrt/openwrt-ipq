name: Cleanup Old Workflows, Tags, and Releases

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1' # Runs every Monday at 3 AM UTC

permissions:
  actions: write
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Install GitHub CLI
        run: |
          sudo apt-key adv --keyserver keyserver.ubuntu.com --recv-key C99B11DEB97541F0
          sudo apt-add-repository https://cli.github.com/packages
          sudo apt update
          sudo apt install gh -y

      - name: Authenticate with GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh auth login --with-token <<< "${GH_TOKEN}"

      - name: Delete old workflow runs (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api -H "Accept: application/vnd.github+json" \
            /repos/${{ github.repository }}/actions/runs?per_page=100 | \
            jq -r '.workflow_runs | sort_by(.created_at) | reverse | .[1:][] | .id' | \
            while read run_id; do
              echo "Deleting run: $run_id"
              gh api --method DELETE /repos/${{ github.repository }}/actions/runs/$run_id
            done

      - name: Delete old tags (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAGS=$(gh api repos/${{ github.repository }}/tags --paginate --jq '.[].name')
          LATEST_TAG=$(echo "$TAGS" | head -n 1)
          for TAG in $TAGS; do
            if [ "$TAG" != "$LATEST_TAG" ]; then
              echo "Deleting tag: $TAG"
              git push origin :refs/tags/$TAG
            fi
          done

      - name: Delete old releases (keep latest)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/${{ github.repository }}/tags --paginate --jq '.[].name' | head -n 1)
          RELEASES=$(gh release list --limit 1000 | awk '{print $1}')
          for REL in $RELEASES; do
            if [ "$REL" != "$LATEST_TAG" ]; then
              echo "Deleting release: $REL"
              gh release delete "$REL" -y
            fi
          done
