name: Archive and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main-nss

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set date-based archive and tag names
        run: |
          DATE=$(date +%Y-%m-%d)
          echo "ARCHIVE_NAME=archive-${DATE}.tar.gz" >> $GITHUB_ENV
          echo "TAG_NAME=backup-${DATE}" >> $GITHUB_ENV

      - name: Create backup archive
        run: |
          mkdir -p backup
          tar -czvf backup/$ARCHIVE_NAME $(find . -maxdepth 1 \( -type f -o -name 'bin' -o -name 'feeds' \))

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: "Backup on ${{ env.TAG_NAME }}"
          body: "Automated backup archive created on ${{ env.TAG_NAME }}"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload archive to Release
        uses: softprops/action-gh-release@v2
        with:
          files: backup/${{ env.ARCHIVE_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
